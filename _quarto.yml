project:
  type: website
  render:
    - "*.qmd"
    - "projects/*.qmd"
    - "projects/*.ipynb"
    - "articles/*.qmd"

website:
  title: "Grace Gordon | Data Science Portfolio"

format:
  html:
    theme:
      - litera
      - theme.scss
    css: styles.css
    toc: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    include-before-body: sidebar.html



